name: MMF Quick E2E with KIND

on:
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope to run'
        required: true
        default: 'smoke'
        type: choice
        options:
        - smoke
        - quick
        - full
      pr_number:
        description: 'PR number (optional)'
        required: false
        type: string
      debug_mode:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  KIND_VERSION: "v0.20.0"
  KUBECTL_VERSION: "v1.28.0"
  DOCKER_BUILDKIT: 1

jobs:
  quick-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        ref: ${{ github.event.inputs.pr_number && format('refs/pull/{0}/head', github.event.inputs.pr_number) || github.ref }}

    - name: Set up Python
      uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

    - name: Install KIND
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl

    - name: Verify installations
      run: |
        echo "✅ Docker version: $(docker --version)"
        echo "✅ KIND version: $(kind --version)"
        echo "✅ kubectl version: $(kubectl version --client --short)"
        echo "✅ Python version: $(python --version)"

    - name: Install dependencies
      run: |
        echo "Installing Python dependencies..."
        uv sync --group dev

    - name: Run E2E tests
      working-directory: ./mmf
      run: |
        cd ${{ github.workspace }}

        echo "🚀 Running MMF E2E tests with scope: ${GITHUB_EVENT_INPUTS_TEST_SCOPE}"

        # Set debug flags if enabled
        DEBUG_FLAGS=""
        if [[ "${GITHUB_EVENT_INPUTS_DEBUG_MODE}" == "true" ]]; then
          DEBUG_FLAGS="--debug"
          echo "🐛 Debug mode enabled"
        fi

        case "${GITHUB_EVENT_INPUTS_TEST_SCOPE}" in
          "smoke")
            echo "💨 Running MMF smoke tests..."
            ./tests/run_mmf_tests.sh --e2e --smoke --verbose $DEBUG_FLAGS
            ;;
          "quick")
            echo "⚡ Running MMF quick tests..."
            ./tests/run_mmf_tests.sh --e2e --quick --verbose $DEBUG_FLAGS
            ;;
          "full")
            echo "🔄 Running full MMF E2E test suite..."
            ./tests/run_mmf_tests.sh --e2e --verbose $DEBUG_FLAGS
            ;;
          *)
            echo "❌ Unknown test scope: ${GITHUB_EVENT_INPUTS_TEST_SCOPE}"
            exit 1
            ;;
        esac
      env:
        GITHUB_EVENT_INPUTS_TEST_SCOPE: ${{ github.event.inputs.test_scope }}
        GITHUB_EVENT_INPUTS_DEBUG_MODE: ${{ github.event.inputs.debug_mode }}

    - name: Check KIND clusters
      if: always()
      run: |
        echo "🔍 Checking KIND clusters..."
        kind get clusters || echo "No KIND clusters found"

        echo "🔍 Checking Docker containers..."
        docker ps -a | grep -E "(kind|mmf)" || echo "No relevant containers found"

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: quick-e2e-artifacts-${{ github.event.inputs.test_scope }}
        path: |
          /tmp/*e2e*.yaml
          /tmp/*test*.log
          test-results/
          logs/
          *.xml
        retention-days: 3

    - name: Cleanup resources
      if: always()
      run: |
        echo "🧹 Cleaning up resources..."

        # List and cleanup KIND clusters
        echo "Cleaning up KIND clusters..."
        for cluster in $(kind get clusters 2>/dev/null || true); do
          echo "Deleting cluster: $cluster"
          kind delete cluster --name "$cluster" || true
        done

        # Cleanup Docker resources
        echo "Cleaning up Docker resources..."
        docker ps -a | grep -E "(mmf|test)" | awk '{print $1}' | xargs -r docker rm -f || true
        docker images | grep -E "(mmf.*test|test.*mmf)" | awk '{print $3}' | xargs -r docker rmi -f || true

        echo "✅ Cleanup completed"

    - name: Generate summary
      if: always()
      run: |
        echo "## 🚀 Quick E2E Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Test Scope:** ${GITHUB_EVENT_INPUTS_TEST_SCOPE}" >> $GITHUB_STEP_SUMMARY
        echo "**Debug Mode:** ${GITHUB_EVENT_INPUTS_DEBUG_MODE}" >> $GITHUB_STEP_SUMMARY
        if [[ -n "${GITHUB_EVENT_INPUTS_PR_NUMBER}" ]]; then
          echo "**PR Number:** #${GITHUB_EVENT_INPUTS_PR_NUMBER}" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### 🛠️ Infrastructure Used" >> $GITHUB_STEP_SUMMARY
        echo "- **Platform:** Ubuntu Latest" >> $GITHUB_STEP_SUMMARY
        echo "- **KIND Version:** ${{ env.KIND_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **kubectl Version:** ${{ env.KUBECTL_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Python Version:** ${{ env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Test Runner:** MMF Unified Test Framework" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [[ $? -eq 0 ]]; then
          echo "### ✅ Result: **PASSED**" >> $GITHUB_STEP_SUMMARY
          echo "All E2E tests completed successfully!" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ Result: **FAILED**" >> $GITHUB_STEP_SUMMARY
          echo "Some E2E tests failed. Check the logs for details." >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "Test logs, KIND manifests, and results are available in the artifacts section." >> $GITHUB_STEP_SUMMARY
      env:
        GITHUB_EVENT_INPUTS_TEST_SCOPE: ${{ github.event.inputs.test_scope }}
        GITHUB_EVENT_INPUTS_DEBUG_MODE: ${{ github.event.inputs.debug_mode }}
        GITHUB_EVENT_INPUTS_PR_NUMBER: ${{ github.event.inputs.pr_number }}
