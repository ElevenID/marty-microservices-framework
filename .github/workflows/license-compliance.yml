# SPDX-License-Identifier: AGPL-3.0-only
name: License Compliance

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - "LICENSE"
      - "README.md"
      - "pyproject.toml"
      - "scripts/README.md"
      - "scripts/check_license_metadata.py"
      - ".github/workflows/license-compliance.yml"
  push:
    branches: [ "main", "dev" ]
    paths:
      - "LICENSE"
      - "README.md"
      - "pyproject.toml"
      - "scripts/README.md"
      - "scripts/check_license_metadata.py"
      - ".github/workflows/license-compliance.yml"

jobs:
  metadata-consistency:
    name: Metadata Consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"

      - name: Validate AGPL metadata
        run: python scripts/check_license_metadata.py

  dependency-license-inventory:
    name: Dependency License Inventory
    runs-on: ubuntu-latest
    needs: metadata-consistency

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install project dependencies
        run: uv sync --all-extras --dev

      - name: Generate dependency license inventory
        run: |
          uv pip install pip-licenses
          uv run --no-sync pip-licenses --format=json > dependency-licenses.json

      - name: Upload dependency license inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dependency-license-inventory
          path: dependency-licenses.json
