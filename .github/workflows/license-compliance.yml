# SPDX-License-Identifier: AGPL-3.0-only
name: License Compliance

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - "LICENSE"
      - "README.md"
      - "pyproject.toml"
      - "scripts/README.md"
      - "scripts/check_license_metadata.py"
      - ".github/workflows/license-compliance.yml"
  push:
    branches: [ "main", "dev" ]
    paths:
      - "LICENSE"
      - "README.md"
      - "pyproject.toml"
      - "scripts/README.md"
      - "scripts/check_license_metadata.py"
      - ".github/workflows/license-compliance.yml"

jobs:
  metadata-consistency:
    name: Metadata Consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Validate AGPL metadata
        run: python scripts/check_license_metadata.py

  dependency-license-inventory:
    name: Dependency License Inventory
    runs-on: ubuntu-latest
    needs: metadata-consistency

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install project dependencies
        run: uv sync --all-extras --dev

      - name: Generate dependency license inventory
        run: |
          uv pip install pip-licenses
          uv run --no-sync pip-licenses --format=json > dependency-licenses.json

      - name: Upload dependency license inventory
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dependency-license-inventory
          path: dependency-licenses.json
