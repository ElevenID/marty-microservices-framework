name: Security Compliance Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  push:
    branches: [main, dev]
    paths:
      - 'mmf/**'
      - 'platform_plugins/**'
      - 'pyproject.toml'
      - 'Dockerfile'
  pull_request:
    branches: [main, dev]
    paths:
      - 'mmf/**'
      - 'platform_plugins/**'
      - 'pyproject.toml'
      - 'Dockerfile'

env:
  PYTHON_VERSION: "3.11"

jobs:
  # SAST - Static Application Security Testing
  sast-analysis:
    name: Static Security Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit semgrep

    - name: Run Bandit security scan
      run: |
        bandit -r mmf/ platform_plugins/ -x "mmf/tests,mmf/examples,**/tests" -ll -f json -o bandit-report.json || true
        bandit -r mmf/ platform_plugins/ -x "mmf/tests,mmf/examples,**/tests" -ll -f txt

    - name: Run pip-audit dependency vulnerability check
      run: |
        pip-audit --format json --output pip-audit-report.json || true
        pip-audit

    - name: Run Semgrep security rules
      run: |
        semgrep scan --config=auto mmf/ platform_plugins/ --json --output=semgrep-report.json || true

    - name: Upload SAST results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sast-security-results
        path: |
          bandit-report.json
          pip-audit-report.json
          semgrep-report.json

  # Secrets Scanning
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run TruffleHog secrets scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --only-verified

    - name: Run GitLeaks secrets scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Container / Filesystem Security
  container-security:
    name: Container Security Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy filesystem vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        skip-dirs: 'examples/demos/istio-1.27.2'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Software Bill of Materials
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv and cyclonedx-py
      run: |
        python -m pip install --upgrade pip uv
        pip install cyclonedx-bom

    - name: Sync project dependencies
      run: uv sync --all-extras

    - name: Generate CycloneDX SBOM
      run: |
        cyclonedx-py environment "$(uv python find)" --of json --output-file sbom.cdx.json
        cyclonedx-py environment "$(uv python find)" --of xml  --output-file sbom.cdx.xml

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: |
          sbom.cdx.json
          sbom.cdx.xml
