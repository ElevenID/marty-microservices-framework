name: Security Compliance Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  push:
    branches: [main, dev]
    paths:
      - 'mmf/**'
      - 'platform_plugins/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/security-compliance.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'mmf/**'
      - 'platform_plugins/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/security-compliance.yml'

env:
  PYTHON_VERSION: "3.11"

permissions:
  contents: read
  security-events: write

jobs:
  # SAST - Static Application Security Testing
  sast-analysis:
    name: Static Security Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit semgrep

    - name: Run Bandit security scan
      run: |
        bandit -r mmf/ platform_plugins/ -x "mmf/tests,mmf/examples,**/tests" -ll -f json -o bandit-report.json || true
        bandit -r mmf/ platform_plugins/ -x "mmf/tests,mmf/examples,**/tests" -ll -f txt

    - name: Run pip-audit dependency vulnerability check
      run: |
        # Audit the project dependency graph, not the scanner environment
        # (which also contains semgrep's unrelated MCP dependencies).
        pip-audit . --format json --output pip-audit-report.json || true
        pip-audit .

    - name: Run Semgrep security rules
      run: |
        semgrep scan --config=auto mmf/ platform_plugins/ --json --output=semgrep-report.json || true

    - name: Upload SAST results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      if: always()
      with:
        name: sast-security-results
        path: |
          bandit-report.json
          pip-audit-report.json
          semgrep-report.json

  # Secrets Scanning
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 0

    - name: Run TruffleHog secrets scan
      uses: trufflesecurity/trufflehog@8708801319700a16c56abb86628803ba766d5563
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --only-verified

    - name: Install GitLeaks
      env:
        GITLEAKS_VERSION: v8.30.1
        GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
      run: |
        curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz" -o gitleaks.tar.gz
        echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
        tar -xzf gitleaks.tar.gz gitleaks
        sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

    - name: Run GitLeaks secrets scan
      run: |
        case "${{ github.event_name }}" in
          pull_request)
            RANGE="${{ github.event.pull_request.head.sha }}^..${{ github.event.pull_request.head.sha }}"
            ;;
          push)
            RANGE="${{ github.event.before }}..${{ github.sha }}"
            ;;
          *)
            RANGE=""
            ;;
        esac

        if [ -z "$RANGE" ] || [[ "$RANGE" == 000000* ]]; then
          echo "Skipping GitLeaks diff scan; no comparable commit range for ${{ github.event_name }}."
          exit 0
        fi

        gitleaks detect --source . --log-opts="$RANGE" --redact --verbose --config .gitleaks.toml
      env:
        GITHUB_TOKEN: ${{ github.token }}

  # Container / Filesystem Security
  container-security:
    name: Container Security Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Run Trivy filesystem vulnerability scan
      uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        skip-dirs: 'examples/demos/istio-1.27.2'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Software Bill of Materials
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv and cyclonedx-py
      run: |
        python -m pip install --upgrade pip uv
        pip install cyclonedx-bom

    - name: Sync project dependencies
      run: uv sync --all-extras

    - name: Generate CycloneDX SBOM
      run: |
        cyclonedx-py environment "$(uv python find)" --of json --output-file sbom.cdx.json
        cyclonedx-py environment "$(uv python find)" --of xml  --output-file sbom.cdx.xml

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: sbom
        path: |
          sbom.cdx.json
          sbom.cdx.xml
