name: MMF PR Validation

on:
  pull_request:
    branches: [ main, dev ]
    types: [ opened, synchronize, reopened, ready_for_review ]
    paths:
      - 'mmf_new/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/**'
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test (optional)'
        required: false
        type: string

# Cancel previous runs for the same PR
concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  KIND_VERSION: v0.24.0
  KUBECTL_VERSION: v1.31.0
  PYTHON_VERSION: "3.13"

jobs:
  # Skip draft PRs unless explicitly requested
  check-pr-status:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should_run }}
    steps:
    - name: Check if PR should run tests
      id: check
      run: |
        if [[ "${{ github.event.pull_request.draft }}" == "true" && "${{ github.event.action }}" != "ready_for_review" ]]; then
          echo "should_run=false" >> $GITHUB_OUTPUT
          echo "Skipping tests for draft PR"
        else
          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "Running tests for PR"
        fi

  # Quick validation tests - run first
  quick-validation:
    needs: check-pr-status
    if: needs.check-pr-status.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync --group dev

    - name: Run code quality checks
      working-directory: ./mmf_new
      run: |
        echo "Running linting and formatting checks on MMF..."
        uv run ruff check . || echo "Linting issues found - will continue with tests"
        uv run ruff format --check . || echo "Formatting issues found - will continue with tests"

    - name: Run architectural tests
      run: |
        echo "Running architectural tests..."
        uv run pytest tests/test_architecture.py -v

    - name: Run unit tests
      working-directory: ./mmf_new
      run: |
        echo "Running MMF unit tests..."
        ../tests/run_mmf_tests.sh --unit --verbose

    - name: Run integration tests
      run: |
        echo "Running integration tests..."
        uv run pytest tests/integration/ -v --tb=short -x || true

  # Contract tests - validate API compatibility
  contract-tests:
    needs: [check-pr-status, quick-validation]
    if: needs.check-pr-status.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync --group dev

    - name: Run contract tests
      working-directory: ./mmf_new
      run: |
        echo "Running MMF API contract validation tests..."
        ../tests/run_mmf_tests.sh --contract --verbose

    - name: Upload contract test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: contract-test-results
        path: |
          test-results/
          *.xml
        retention-days: 3

  # End-to-end tests - comprehensive system validation
  e2e-tests:
    needs: [check-pr-status, quick-validation]
    if: needs.check-pr-status.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      matrix:
        test-mode: [quick, smoke]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install KIND
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl

    - name: Verify installations
      run: |
        echo "Docker version: $(docker --version)"
        echo "KIND version: $(kind --version)"
        echo "kubectl version: $(kubectl version --client --short)"

    - name: Run E2E Tests (${{ matrix.test-mode }} mode)
      id: e2e-tests
      working-directory: ./mmf_new
      run: |
        cd ${{ github.workspace }}

        if [[ "${{ matrix.test-mode }}" == "quick" ]]; then
          echo "Running quick MMF E2E tests..."
          ./tests/run_mmf_tests.sh --e2e --quick --verbose
        elif [[ "${{ matrix.test-mode }}" == "smoke" ]]; then
          echo "Running MMF smoke tests..."
          ./tests/run_mmf_tests.sh --e2e --smoke --verbose
        else
          echo "Running full MMF E2E test suite..."
          ./tests/run_mmf_tests.sh --e2e --verbose
        fi

    - name: Upload E2E test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-artifacts-${{ matrix.test-mode }}
        path: |
          /tmp/identity-service-e2e.yaml
          /tmp/e2e-test-*.log
          test-results/
        retention-days: 7

    - name: Cleanup E2E resources
      if: always()
      run: |
        echo "Cleaning up E2E test resources..."
        # Clean up KIND clusters
        for cluster in $(kind get clusters 2>/dev/null | grep -E "(test|e2e|mmf)" || true); do
          echo "Deleting cluster: $cluster"
          kind delete cluster --name "$cluster" || true
        done

        # Clean up Docker images
        docker rmi mmf/identity-service:e2e-test || true
        docker rmi $(docker images -q --filter "reference=mmf/*:*test*" 2>/dev/null) || true

  # Performance baseline - ensure no major regressions
  performance-check:
    needs: [check-pr-status, quick-validation]
    if: needs.check-pr-status.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync --group dev

    - name: Run performance baseline tests
      working-directory: ./mmf_new
      run: |
        echo "Running MMF performance baseline tests..."
        # Use unified test runner for performance tests
        ../tests/run_mmf_tests.sh --performance --quick --verbose

    - name: Upload performance results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-baseline-results
        path: |
          performance-results/
          benchmark-*.json
        retention-days: 3

  # Security validation - quick security checks
  security-check:
    needs: [check-pr-status, quick-validation]
    if: needs.check-pr-status.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync --group dev

    - name: Run security baseline tests
      working-directory: ./mmf_new
      run: |
        echo "Running MMF security baseline tests..."
        # Use unified test runner for security tests
        ../tests/run_mmf_tests.sh --security --quick --verbose

    - name: Check for secrets in code
      run: |
        echo "Scanning for potential secrets..."
        # Basic secret scanning (you might want to use a proper tool like TruffleHog)
        git diff origin/main...HEAD --name-only | xargs grep -l -i -E "(password|secret|key|token|api.key)" || echo "No obvious secrets found"

  # Build validation - ensure code can be built into container images
  builds:
    needs: [check-pr-status, quick-validation]
    if: needs.check-pr-status.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build MMF identity service image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: false
        load: true
        tags: mmf/identity-service:pr-${{ github.event.pull_request.number || 'local' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test container startup
      run: |
        echo "Testing container can start successfully..."
        IMAGE_TAG="mmf/identity-service:pr-${{ github.event.pull_request.number || 'local' }}"

        # Verify the image exists locally
        if docker images | grep -q "mmf/identity-service"; then
          echo "✅ Image built successfully: $IMAGE_TAG"
        else
          echo "❌ Image not found locally"
          docker images
          exit 1
        fi

        # Start container in detached mode
        CONTAINER_ID=$(docker run --rm --name test-container \
          -e ENVIRONMENT=testing \
          -d "$IMAGE_TAG")

        if [ -z "$CONTAINER_ID" ]; then
          echo "❌ Failed to start container"
          exit 1
        fi

        echo "✅ Container started with ID: $CONTAINER_ID"

        # Wait a moment for startup
        sleep 5

        # Check if container is still running
        if docker ps | grep test-container; then
          echo "✅ Container is running successfully"
          docker stop test-container
        else
          echo "❌ Container failed to start or exited"
          docker logs test-container 2>/dev/null || true
          exit 1
        fi

    - name: Validate Dockerfile best practices
      run: |
        echo "Validating Dockerfile best practices..."
        # Basic Dockerfile validation
        if [ -f "./Dockerfile" ]; then
          echo "✅ Dockerfile exists"

          # Check for multi-stage build
          if grep -q "FROM.*AS" ./Dockerfile; then
            echo "✅ Multi-stage build detected"
          else
            echo "⚠️  Consider using multi-stage builds for smaller images"
          fi

          # Check for non-root user
          if grep -q "USER" ./Dockerfile; then
            echo "✅ Non-root user configured"
          else
            echo "⚠️  Consider running as non-root user for security"
          fi

        else
          echo "❌ Dockerfile not found"
          exit 1
        fi

  # Final validation summary
  validation-summary:
    needs: [check-pr-status, quick-validation, contract-tests, e2e-tests, performance-check, security-check, builds]
    if: always() && (needs.check-pr-status.outputs.should-run == 'true' || needs.check-pr-status.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Collect test results
      run: |
        set +e  # Don't exit on error

        echo "## PR Validation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### Test Results" >> $GITHUB_STEP_SUMMARY
        echo "| Test Category | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|---------------|--------|" >> $GITHUB_STEP_SUMMARY

        # Get results with fallbacks
        QUICK_RESULT="${{ needs.quick-validation.result || 'unknown' }}"
        CONTRACT_RESULT="${{ needs.contract-tests.result || 'unknown' }}"
        E2E_RESULT="${{ needs.e2e-tests.result || 'unknown' }}"
        PERF_RESULT="${{ needs.performance-check.result || 'unknown' }}"
        SEC_RESULT="${{ needs.security-check.result || 'unknown' }}"
        BUILD_RESULT="${{ needs.builds.result || 'unknown' }}"

        # Quick validation
        if [[ "$QUICK_RESULT" == "success" ]]; then
          echo "| Quick Validation | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        elif [[ "$QUICK_RESULT" == "skipped" ]]; then
          echo "| Quick Validation | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Quick Validation | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
        fi

        # Contract tests
        if [[ "$CONTRACT_RESULT" == "success" ]]; then
          echo "| Contract Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        elif [[ "$CONTRACT_RESULT" == "skipped" ]]; then
          echo "| Contract Tests | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Contract Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
        fi

        # E2E tests
        if [[ "$E2E_RESULT" == "success" ]]; then
          echo "| E2E Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        elif [[ "$E2E_RESULT" == "skipped" ]]; then
          echo "| E2E Tests | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| E2E Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
        fi

        # Performance check
        if [[ "$PERF_RESULT" == "success" ]]; then
          echo "| Performance Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        elif [[ "$PERF_RESULT" == "skipped" ]]; then
          echo "| Performance Check | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Performance Check | ⚠️ Issues Found |" >> $GITHUB_STEP_SUMMARY
        fi

        # Security check
        if [[ "$SEC_RESULT" == "success" ]]; then
          echo "| Security Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        elif [[ "$SEC_RESULT" == "skipped" ]]; then
          echo "| Security Check | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Security Check | ⚠️ Issues Found |" >> $GITHUB_STEP_SUMMARY
        fi

        # Build check
        if [[ "$BUILD_RESULT" == "success" ]]; then
          echo "| Build Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        elif [[ "$BUILD_RESULT" == "skipped" ]]; then
          echo "| Build Check | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Build Check | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps" >> $GITHUB_STEP_SUMMARY

        # Determine overall status
        if [[ "$QUICK_RESULT" == "success" && "$CONTRACT_RESULT" == "success" && "$E2E_RESULT" == "success" && "$BUILD_RESULT" == "success" ]]; then
          echo "✅ **PR is ready for review!** All critical tests passed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The code changes have been validated and are ready to merge." >> $GITHUB_STEP_SUMMARY
          exit 0
        else
          echo "⚠️ **PR needs attention.** Some tests failed or were skipped." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please review the failed tests and make necessary fixes." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Critical tests status:**" >> $GITHUB_STEP_SUMMARY
          echo "- Quick Validation: $QUICK_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "- Contract Tests: $CONTRACT_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: $E2E_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "- Build Check: $BUILD_RESULT" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Comment on PR
      if: github.event.pull_request.number
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.payload.pull_request.number;

          // Get job results with fallbacks
          const quickResult = "${{ needs.quick-validation.result || 'unknown' }}";
          const contractResult = "${{ needs.contract-tests.result || 'unknown' }}";
          const e2eResult = "${{ needs.e2e-tests.result || 'unknown' }}";
          const perfResult = "${{ needs.performance-check.result || 'unknown' }}";
          const secResult = "${{ needs.security-check.result || 'unknown' }}";
          const buildResult = "${{ needs.builds.result || 'unknown' }}";

          let status = "✅ **All tests passed!**";
          let details = "Your PR has been validated and is ready for review.";

          if (quickResult !== "success" || contractResult !== "success" || e2eResult !== "success" || buildResult !== "success") {
            status = "⚠️ **Some tests need attention**";
            details = "Please check the workflow results and address any issues.";
          }

          const getStatusEmoji = (result) => {
            switch(result) {
              case "success": return "✅ Passed";
              case "skipped": return "⏭️ Skipped";
              case "failure": return "❌ Failed";
              default: return "❓ Unknown";
            }
          };

          const body = `## 🤖 PR Validation Results

          ${status}

          ### Test Results Summary:
          - **Quick Validation**: ${getStatusEmoji(quickResult)}
          - **Contract Tests**: ${getStatusEmoji(contractResult)}
          - **E2E Tests**: ${getStatusEmoji(e2eResult)}
          - **Performance**: ${getStatusEmoji(perfResult)}
          - **Security**: ${getStatusEmoji(secResult)}
          - **Build Check**: ${getStatusEmoji(buildResult)}

          ${details}

          ---
          *View detailed results in the [Actions tab](${context.payload.repository.html_url}/actions/runs/${context.runId})*`;

          try {
            // Check for existing bot comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🤖 PR Validation Results')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
          } catch (error) {
            console.log('Error posting comment:', error.message);
            // Don't fail the job if commenting fails
          }
