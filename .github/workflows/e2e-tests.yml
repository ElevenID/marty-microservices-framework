name: MMF E2E Tests

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'mmf/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'mmf/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'

env:
  PYTHON_VERSION: "3.11"
  KIND_VERSION: "v0.20.0"
  KUBECTL_VERSION: "v1.28.0"

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Set up Python
      uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync --group dev

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

    - name: Install KIND
      run: |
        # Download and install KIND
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    - name: Install kubectl
      run: |
        # Download and install kubectl
        curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl

    - name: Verify installations
      run: |
        echo "Docker version:"
        docker --version
        echo "KIND version:"
        kind --version
        echo "kubectl version:"
        kubectl version --client

    - name: Run E2E tests
      run: |
        echo "Running MMF E2E tests..."
        uv run pytest mmf/tests/e2e -v --no-cov || true
      continue-on-error: true

    - name: Upload test artifacts on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: e2e-test-logs
        path: |
          /tmp/identity-service-e2e.yaml
        retention-days: 7

    - name: Cleanup on failure
      if: failure()
      run: |
        echo "Cleaning up on failure..."
        kind delete cluster --name mmf-e2e-test || true
        docker rmi mmf/identity-service:e2e-test || true
