name: MMF E2E Tests

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'mmf/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'mmf/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'

env:
  PYTHON_VERSION: "3.11"
  KIND_VERSION: "v0.20.0"
  KUBECTL_VERSION: "v1.28.0"

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install KIND
      run: |
        # Download and install KIND
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    - name: Install kubectl
      run: |
        # Download and install kubectl
        curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl

    - name: Verify installations
      run: |
        echo "Docker version:"
        docker --version
        echo "KIND version:"
        kind --version
        echo "kubectl version:"
        kubectl version --client

    - name: Run E2E tests
      working-directory: ./mmf
      run: |
        cd ${{ github.workspace }}
        echo "Running MMF E2E tests..."
        ./tests/run_mmf_tests.sh --e2e --verbose

    - name: Upload test artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-logs
        path: |
          /tmp/identity-service-e2e.yaml
        retention-days: 7

    - name: Cleanup on failure
      if: failure()
      run: |
        echo "Cleaning up on failure..."
        kind delete cluster --name mmf-e2e-test || true
        docker rmi mmf/identity-service:e2e-test || true
