name: Reusable Build

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Name of the service being built'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        type: string
      context:
        description: 'Build context path'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Target platforms for build'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      registry:
        description: 'Container registry'
        required: false
        type: string
        default: 'ghcr.io'
      push:
        description: 'Whether to push the image'
        required: false
        type: boolean
        default: true
      sign-image:
        description: 'Whether to sign the image with Cosign'
        required: false
        type: boolean
        default: true
      scan-image:
        description: 'Whether to scan image for vulnerabilities'
        required: false
        type: boolean
        default: true
    outputs:
      image-digest:
        description: 'Digest of the built image'
        value: ${{ jobs.build.outputs.digest }}
      image-tags:
        description: 'Tags of the built image'
        value: ${{ jobs.build.outputs.tags }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Cosign keyless signing
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Log in to Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.service-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ inputs.service-name }}
            org.opencontainers.image.description=Marty microservice: ${{ inputs.service-name }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=${{ inputs.service-name }}

      - name: Install Cosign
        if: ${{ inputs.sign-image && inputs.push }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Sign container image
        if: ${{ inputs.sign-image && inputs.push }}
        run: |
          cosign sign --yes ${INPUTS_REGISTRY}/${{ github.repository_owner }}/${INPUTS_SERVICE_NAME}@${{ steps.build.outputs.digest }}
        env:
          INPUTS_REGISTRY: ${{ inputs.registry }}
          INPUTS_SERVICE_NAME: ${{ inputs.service-name }}

      - name: Install Trivy
        if: ${{ inputs.scan-image }}
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

      - name: Scan image for vulnerabilities
        if: ${{ inputs.scan-image }}
        run: |
          trivy image --format sarif --output trivy-results.sarif ${INPUTS_REGISTRY}/${{ github.repository_owner }}/${INPUTS_SERVICE_NAME}:${{ github.sha }}
        env:
          INPUTS_REGISTRY: ${{ inputs.registry }}
          INPUTS_SERVICE_NAME: ${{ inputs.service-name }}

      - name: Upload Trivy scan results
        if: ${{ inputs.scan-image && always() }}
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          sarif_file: trivy-results.sarif
          category: container-scan-${{ inputs.service-name }}

      - name: Generate SBOM
        if: ${{ inputs.push }}
        run: |
          # Generate Software Bill of Materials
          trivy image --format spdx-json --output sbom.spdx.json ${INPUTS_REGISTRY}/${{ github.repository_owner }}/${INPUTS_SERVICE_NAME}:${{ github.sha }}
        env:
          INPUTS_REGISTRY: ${{ inputs.registry }}
          INPUTS_SERVICE_NAME: ${{ inputs.service-name }}

      - name: Upload SBOM
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-${{ inputs.service-name }}
          path: sbom.spdx.json
