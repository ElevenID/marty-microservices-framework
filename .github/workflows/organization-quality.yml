name: Organization Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-quality:
    uses: ElevenID/.github/.github/workflows/quality-workflows.yml@f471fff1902112af03a02e2c21776afca791b27f
    with:
      policy-ref: f471fff1902112af03a02e2c21776afca791b27f

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: ElevenID/.github/.github/workflows/dependency-review.yml@f471fff1902112af03a02e2c21776afca791b27f

  scorecard:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      security-events: write # Required to upload Scorecard SARIF.
      id-token: write # Required for keyless Scorecard result publishing.
      contents: read
    uses: ElevenID/.github/.github/workflows/scorecard.yml@f471fff1902112af03a02e2c21776afca791b27f
