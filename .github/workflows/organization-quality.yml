name: Organization Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-quality:
    uses: ElevenID/.github/.github/workflows/quality-workflows.yml@b27772ce9a431bdfdfa87310c8c4bfd9787a3dd1
    with:
      policy-ref: 758fce1cd36f6f6bde12fed80921b86f19c2916b

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: ElevenID/.github/.github/workflows/dependency-review.yml@758fce1cd36f6f6bde12fed80921b86f19c2916b

  scorecard:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      security-events: write # Required to upload Scorecard SARIF.
      id-token: write # Required for keyless Scorecard result publishing.
      contents: read
    uses: ElevenID/.github/.github/workflows/scorecard.yml@758fce1cd36f6f6bde12fed80921b86f19c2916b
