name: Reusable CI

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.13'
      service-name:
        description: 'Name of the service being built'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      run-tests:
        description: 'Whether to run tests'
        required: false
        type: boolean
        default: true
      run-lint:
        description: 'Whether to run linting'
        required: false
        type: boolean
        default: true
      run-type-check:
        description: 'Whether to run type checking'
        required: false
        type: boolean
        default: true
      test-command:
        description: 'Command to run tests'
        required: false
        type: string
        default: 'uv run pytest'
    outputs:
      test-results:
        description: 'Test results summary'
        value: ${{ jobs.quality.outputs.test-results }}
      lint-results:
        description: 'Lint results summary'
        value: ${{ jobs.quality.outputs.lint-results }}

jobs:
  quality:
    runs-on: ubuntu-latest
    outputs:
      test-results: ${{ steps.test.outputs.results }}
      lint-results: ${{ steps.lint.outputs.results }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up uv
        uses: astral-sh/setup-uv@6dfebec6ddbcd197e02256fbdf54deb334fb7f06

      - name: Install Python ${{ inputs.python-version }}
        run: uv python install ${INPUTS_PYTHON_VERSION}
        env:
          INPUTS_PYTHON_VERSION: ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run linting
        if: ${{ inputs.run-lint }}
        id: lint
        run: |
          echo "Running Ruff linting for ${INPUTS_SERVICE_NAME}"
          uv run ruff check src tests --output-format=github
          echo "results=passed" >> $GITHUB_OUTPUT
        env:
          INPUTS_SERVICE_NAME: ${{ inputs.service-name }}

      - name: Run type checking
        if: ${{ inputs.run-type-check }}
        run: |
          echo "Running type checking for ${INPUTS_SERVICE_NAME}"
          uv run mypy src/
        env:
          INPUTS_SERVICE_NAME: ${{ inputs.service-name }}

      - name: Run tests
        if: ${{ inputs.run-tests }}
        id: test
        run: |
          echo "Running tests for ${INPUTS_SERVICE_NAME}"
          ${INPUTS_TEST_COMMAND} --junitxml=test-results.xml --cov=src --cov-report=xml
          echo "results=passed" >> $GITHUB_OUTPUT
        env:
          INPUTS_SERVICE_NAME: ${{ inputs.service-name }}
          INPUTS_TEST_COMMAND: ${{ inputs.test-command }}

      - name: Upload test results
        if: ${{ inputs.run-tests && always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results-${{ inputs.service-name }}
          path: |
            test-results.xml
            coverage.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: ${{ inputs.run-tests }}
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457
        with:
          file: ./coverage.xml
          flags: ${{ inputs.service-name }}
          name: ${{ inputs.service-name }}-coverage
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run Bandit security scan
        run: |
          pip install bandit[toml]
          bandit -r src/ -f json -o bandit-report.json || true

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-scan-${{ inputs.service-name }}
          path: bandit-report.json
          if-no-files-found: ignore

      - name: Run safety check for vulnerabilities
        run: |
          pip install safety
          safety check --json --output safety-report.json || true

      - name: Upload safety check results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: safety-check-${{ inputs.service-name }}
          path: safety-report.json
          if-no-files-found: ignore
