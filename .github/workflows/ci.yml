name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      # Service containers for integration tests
      # Note: testcontainers will spin up their own, but having these available
      # ensures the environment is capable of running containers.
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
        env:
          POSTGRES_PASSWORD: password # pragma: allowlist secret
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "0.11.3"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --all-extras --dev

    - name: Run Architecture Checks
      run: |
        # Run the architecture tests (no coverage - these don't execute code)
        uv run pytest mmf/tests/test_architecture.py --no-cov

    - name: Run Core Tests with Coverage
      run: |
        uv run pytest mmf/tests/unit mmf/tests/integration --no-cov

    - name: Run Contract Tests
      run: |
        uv run pytest mmf/tests/contract --no-cov
