domain: petstore
version: 1.0.0

services:
  - name: pet-service
    port: 8000
    database:
      type: postgresql
      host: ${DB_HOST:-localhost}
      port: 5432
      name: pet_db
      user: ${DB_USER:-postgres}
      password: ${DB_PASSWORD:-postgres}
    messaging:
      kafka:
        bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
        topic_prefix: pet_service
    security:
      authentication:
        type: jwt
        issuer: https://identity.marty.local
        audience: pet-service
      authorization:
        rbac:
          enabled: true
          roles:
            admin: ["create:pet", "delete:pet", "update:pet"]
            user: ["read:pet"]

  - name: store-service
    port: 8001
    database:
      type: postgresql
      host: ${DB_HOST:-localhost}
      port: 5432
      name: store_db
      user: ${DB_USER:-postgres}
      password: ${DB_PASSWORD:-postgres}
    cache:
      type: redis
      host: ${REDIS_HOST:-localhost}
      port: 6379
    messaging:
      kafka:
        bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
        topic_prefix: store_service
    resilience:
      circuit_breaker:
        failure_threshold: 5
        recovery_timeout: 30
      retry:
        max_attempts: 3
        backoff_factor: 2
    security:
      authentication:
        type: jwt
        issuer: https://identity.marty.local
        audience: store-service
      authorization:
        rbac:
          enabled: true
          roles:
            admin: ["manage:catalog", "view:orders"]
            customer: ["create:order", "view:own_orders"]

  - name: delivery-board-service
    port: 8002
    database:
      type: postgresql
      host: ${DB_HOST:-localhost}
      port: 5432
      name: delivery_db
      user: ${DB_USER:-postgres}
      password: ${DB_PASSWORD:-postgres}
    messaging:
      kafka:
        bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
        topic_prefix: delivery_service
    security:
      authentication:
        type: jwt
        issuer: https://identity.marty.local
        audience: delivery-service
      authorization:
        rbac:
          enabled: true
          roles:
            driver: ["view:deliveries", "update:delivery_status"]
            dispatcher: ["create:delivery", "assign:truck"]

global:
  observability:
    tracing:
      enabled: true
      exporter: otlp
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}
    metrics:
      enabled: true
      exporter: prometheus
  secrets:
    provider: vault
    address: ${VAULT_ADDR:-http://localhost:8200}
