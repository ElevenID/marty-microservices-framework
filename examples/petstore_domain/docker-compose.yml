services:
  pet-service:
    build:
      context: ../../
      dockerfile: examples/petstore_domain/services/pet_service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      OTEL_SERVICE_NAME: pet-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_EXPORTER: otlp
    command: uvicorn examples.petstore_domain.services.pet_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - jaeger

  store-service:
    build:
      context: ../../
      dockerfile: examples/petstore_domain/services/store_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      PYTHONPATH: /app
      PET_SERVICE_URL: http://pet-service:8000
      DELIVERY_BOARD_URL: http://delivery-board-service:8002
      OTEL_SERVICE_NAME: store-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_EXPORTER: otlp
    command: uvicorn examples.petstore_domain.services.store_service.main:app --host 0.0.0.0 --port 8001
    depends_on:
      - pet-service
      - delivery-board-service
      - jaeger

  delivery-board-service:
    build:
      context: ../../
      dockerfile: examples/petstore_domain/services/delivery_board_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      PYTHONPATH: /app
      OTEL_SERVICE_NAME: delivery-board-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_EXPORTER: otlp
    command: uvicorn examples.petstore_domain.services.delivery_board_service.main:app --host 0.0.0.0 --port 8002
    depends_on:
      - jaeger

  # --- Observability Stack ---

  jaeger:
    image: jaegertracing/all-in-one:1.64
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  dozzle:
    image: amir20/dozzle:v8.9.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAIL: 100
      DOZZLE_FILTER: "status=running"
