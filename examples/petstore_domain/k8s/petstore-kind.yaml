apiVersion: v1
kind: Namespace
metadata:
  name: petstore
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-board
  namespace: petstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-board
  template:
    metadata:
      labels:
        app: delivery-board
    spec:
      containers:
        - name: delivery-board
          image: petstore/delivery-board-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-board-service
  namespace: petstore
spec:
  selector:
    app: delivery-board
  ports:
    - port: 8002
      targetPort: 8002
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store
  namespace: petstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store
  template:
    metadata:
      labels:
        app: store
    spec:
      containers:
        - name: store
          image: petstore/store-service:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: DELIVERY_BOARD_URL
              value: http://delivery-board-service.petstore.svc.cluster.local:8002
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: store-service
  namespace: petstore
spec:
  selector:
    app: store
  ports:
    - port: 8001
      targetPort: 8001
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pet
  namespace: petstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pet
  template:
    metadata:
      labels:
        app: pet
    spec:
      containers:
        - name: pet
          image: petstore/pet-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: pet-service
  namespace: petstore
spec:
  selector:
    app: pet
  ports:
    - port: 8000
      targetPort: 8000
      name: http
