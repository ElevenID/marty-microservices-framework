apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: video-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
      - name: catalog-service
        image: mmf/catalog-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: video-streaming
spec:
  selector:
    app: catalog-service
  ports:
  - port: 8001
    targetPort: 8001
