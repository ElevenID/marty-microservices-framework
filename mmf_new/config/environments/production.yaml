# Production Environment Configuration
# Secure, performance-optimized configuration for production

# Import base configuration
base: "../base.yaml"

# Environment metadata
environment:
  name: "production"
  debug: false
  hot_reload: false
  strict_validation: true

# Production security (fully enabled)
security:
  authentication:
    jwt:
      secret: "${SECRET:jwt_secret_production}"  # pragma: allowlist secret
      expires_delta_minutes: 30
      algorithm: "HS256"
      verify_signature: true
      verify_expiration: true
      verify_issuer: true
      verify_audience: true
    required: true

  authorization:
    enabled: true
    default_policy: "deny"

  tls:
    enabled: true
    mutual_tls: true
    verify_hostname: true
    min_version: "TLSv1.2"

# Production database
database:
  host: "${SECRET:database_host_production}"  # pragma: allowlist secret
  port: 5432
  database: "${SECRET:database_name_production}"  # pragma: allowlist secret
  username: "${SECRET:database_username_production}"  # pragma: allowlist secret
  password: "${SECRET:database_password_production}"  # pragma: allowlist secret
  ssl_mode: "require"

  pool:
    min_size: 5
    max_size: 20
    timeout: 30
    recycle_time: 3600

# Production observability
observability:
  logging:
    level: "INFO"
    format: "json"  # Structured logging for production
    handlers: ["console", "file", "syslog"]

  tracing:
    enabled: true
    sample_rate: 0.01  # Low sampling for performance

  metrics:
    enabled: true
    prometheus_enabled: true
    detailed_metrics: true

# Production messaging
messaging:
  connection:
    host: "${SECRET:message_broker_host_production}"  # pragma: allowlist secret
    port: 6379
    database: 0
    username: "${SECRET:message_broker_username_production}"  # pragma: allowlist secret
    password: "${SECRET:message_broker_password_production}"  # pragma: allowlist secret
    ssl: true
    ssl_cert_path: "/etc/ssl/certs/redis-client.pem"
    ssl_key_path: "/etc/ssl/private/redis-client.key"

# Production cache
cache:
  connection:
    host: "${SECRET:cache_host_production}"  # pragma: allowlist secret
    port: 6379
    database: 1
    username: "${SECRET:cache_username_production}"  # pragma: allowlist secret
    password: "${SECRET:cache_password_production}"  # pragma: allowlist secret
    ssl: true
  default_ttl: 3600
  max_memory_policy: "allkeys-lru"

# Production resilience (robust settings)
resilience:
  circuit_breaker:
    failure_threshold: 10
    recovery_timeout: 120
    half_open_max_calls: 5

  retry_policy:
    max_attempts: 5
    backoff_multiplier: 2.0
    max_delay_seconds: 60
    jitter: true

  timeout:
    default: 60.0
    database: 30.0
    external_api: 45.0
    cache: 5.0

  bulkhead:
    database_operations:
      max_concurrent: 20
      timeout: 30.0
    external_api_calls:
      max_concurrent: 30
      timeout: 45.0

# Production health checks
health_checks:
  enabled: true
  interval_seconds: 30
  timeout_seconds: 10
  failure_threshold: 3
  success_threshold: 2

  checks:
    - name: "database"
      type: "database"
      query: "SELECT 1"
    - name: "cache"
      type: "redis"
      command: "PING"
    - name: "messaging"
      type: "redis"
      command: "PING"

# Resource limits
resources:
  memory_limit: "1Gi"
  cpu_limit: "1000m"
  memory_request: "512Mi"
  cpu_request: "500m"

# Note: Production secrets should be managed by external secret management
# Examples of secret references that should be provided by the environment
secrets_required:
  - jwt_secret_production
  - database_host_production
  - database_name_production
  - database_username_production
  - database_password_production
  - message_broker_host_production
  - message_broker_username_production
  - message_broker_password_production
  - cache_host_production
  - cache_username_production
  - cache_password_production
  - jaeger_endpoint_production
