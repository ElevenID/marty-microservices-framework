apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: jwt-auth-e2e-test
nodes:
- extraPortMappings:
  - containerPort: 30080
    hostPort: 30080
    protocol: TCP
  - containerPort: 443
    hostPort: 8443
    protocol: TCP
  kubeadmConfigPatches:
  - "kind: InitConfiguration\nnodeRegistration:\n  kubeletExtraArgs:\n    node-labels:\
    \ \"ingress-ready=true\"\n"
  role: control-plane
